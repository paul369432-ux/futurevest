<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureVest - Sign Up</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#0b3d91,#2563eb,#4f46e5);
}

.box{
background:#fff;
padding:40px;
border-radius:15px;
width:350px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
color:#0b3d91;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

button{
width:100%;
padding:15px;
background:#2563eb;
color:#fff;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

p{
margin-top:20px;
}

a{
color:#2563eb;
text-decoration:none;
font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
<h1>Create Account</h1>

<input type="text" placeholder="Full Name">
<input type="email" placeholder="Email">
<input type="password" placeholder="Password">

<button onclick="signup()">Create Account</button>

<p>Already have an account? <a href="login.html">Login</a></p>

</div>
<script>
function signup(){
alert("Account created successfully!");
window.location.href="login.html";
}
</script>
</body>
</html>
