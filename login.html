<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutureVest - Login</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:linear-gradient(135deg,#0b3d91,#2563eb,#4f46e5);
}

.login-box{
background:#fff;
padding:40px;
border-radius:15px;
width:350px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
text-align:center;
margin-bottom:10px;
color:#0b3d91;
}

p{
text-align:center;
margin-bottom:25px;
color:#666;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:8px;
background:#0b3d91;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#2563eb;
}

.signup{
text-align:center;
margin-top:20px;
}

.signup{
text-align:center;
margin-top:20px;
color:#555;
}

.signup a{
color:#2563eb;
font-weight:bold;
text-decoration:none;
margin-left:5px;
display:inline;
}

.signup a:hover{
text-decoration:underline;
}
</style>

</head>

<body>

<div class="login-box">

<h1>FutureVest</h1>

<p>Welcome back. Sign in to continue.</p>

<input type="email" id="email" placeholder="Email">

<input type="password" placeholder="Password">

<button>Login</button>

<div class="signup">
Don't have an account?
<a href="signup.html">Sign Up</a>
</div>

</body>
</html>
